<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Romántica Neón y Pétalos</title>
    <style>
        /* --- ESTILOS VISUALES --- */
        body {
            background-color: #10101a; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden; 
            color: white;
            position: relative;
        }

        /* --- LLUVIA DE PÉTALOS --- */
        .petalos-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .petalo {
            position: absolute;
            background-color: #ff0055;
            border-radius: 50% 0 50% 50%;
            opacity: 0.8;
            filter: drop-shadow(0 0 5px #ff0055);
            animation: caida 10s linear infinite;
        }

        @keyframes caida {
            0% { transform: translate(0, -10%) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translate(100px, 110%) rotate(360deg); opacity: 0; }
        }

        /* --- CONTENIDO PRINCIPAL --- */
        .contenedor-principal {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            position: relative;
            width: 100%;
        }

        .corazon-neon {
            font-size: 100px;
            color: #ff0055; 
            text-shadow: 0 0 10px #ff0055, 0 0 20px #ff0055, 0 0 40px #ff0055;
            cursor: pointer;
            transition: transform 0.3s ease;
            animation: latido 1.2s infinite;
            margin-bottom: 10px;
        }

        @keyframes latido {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
        }

        h2 {
            text-shadow: 0 0 10px #fff, 0 0 20px #ff0055;
            margin-bottom: 20px;
            padding: 0 20px;
            font-size: 1.5rem;
        }

        .formulario-amor {
            background: rgba(255, 255, 255, 0.05); 
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
            width: 85%;
            max-width: 320px;
            max-height: 0; 
            opacity: 0;
            overflow: hidden;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            transform: scale(0.9);
        }

        .formulario-amor.activo {
            max-height: 700px; 
            opacity: 1;
            transform: scale(1);
            margin-top: 15px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #ff0055;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
            outline: none;
            font-family: inherit;
            font-size: 16px;
        }

        textarea {
            height: 120px;
            resize: none;
        }

        input:focus, textarea:focus { 
            border-color: #fff; 
            box-shadow: 0 0 10px #ff0055; 
        }

        .btn-enviar {
            background: none;
            color: #ff0055;
            border: 2px solid #ff0055;
            padding: 12px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 15px;
            transition: 0.3s;
            text-shadow: 0 0 5px #ff0055;
        }

        .btn-enviar:hover {
            background: #ff0055;
            color: white;
            box-shadow: 0 0 20px #ff0055;
        }

        .btn-enviar:disabled { opacity: 0.5; }

    </style>
</head>
<body>

    <div class="petalos-container" id="petalos"></div>

    <div class="contenedor-principal">
        <div class="corazon-neon" id="corazon-btn" onclick="abrirFormulario()">❤️</div>
        <h2 id="titulo">Pulsa el corazón...</h2>

        <div class="formulario-amor" id="formulario">
            <input type="text" id="nombre" placeholder="Tu lindo nombre" required>
            <input type="tel" id="celular" placeholder="Tu número de celular" required>
            <textarea id="mensaje" placeholder="Escribe aquí tu mensaje con emojis ✨💖..." required></textarea>
            <button class="btn-enviar" id="btn-submit" onclick="enviarDatos(event)">¡ACEPTO TU AMOR!</button>
        </div>
    </div>

    <script>
        function abrirFormulario() {
            document.getElementById('formulario').classList.add('activo');
            document.getElementById('titulo').textContent = "Para mi persona especial";
            document.getElementById('corazon-btn').style.animation = "none"; 
            document.getElementById('corazon-btn').onclick = null; 
        }

        async function enviarDatos(event) {
            event.stopPropagation();
            
            const nombre = document.getElementById('nombre').value;
            const celular = document.getElementById('celular').value;
            const mensaje = document.getElementById('mensaje').value;

            if(!nombre || !celular || !mensaje) {
                alert("Por favor, completa todos los campos ❤️");
                return;
            }

            // URL YA REEMPLAZADA CON TU ID
            const FORM_URL = "https://formspree.io/f/mzdjgodr"; 
            const boton = document.getElementById('btn-submit');

            boton.textContent = "ENVIANDO...";
            boton.disabled = true;

            try {
                const response = await fetch(FORM_URL, {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json' 
                    },
                    body: JSON.stringify({ 
                        Nombre: nombre, 
                        Celular: celular, 
                        Mensaje: mensaje 
                    })
                });

                if (response.ok) {
                    alert("¡Gracias " + nombre + "! He recibido tus palabras ✨");
                    boton.textContent = "¡ENVIADO!";
                } else {
                    alert("Error. Revisa que hayas confirmado el correo de Formspree.");
                    boton.disabled = false;
                    boton.textContent = "¡ACEPTO TU AMOR!";
                }
            } catch (error) {
                alert("Error de conexión.");
                boton.disabled = false;
                boton.textContent = "¡ACEPTO TU AMOR!";
            }
        }

        function crearPetalos() {
            const container = document.getElementById('petalos');
            for (let i = 0; i < 50; i++) {
                const petalo = document.createElement('div');
                petalo.classList.add('petalo');
                petalo.style.left = Math.random() * 100 + 'vw';
                const size = Math.random() * 15 + 10 + 'px';
                petalo.style.width = size;
                petalo.style.height = size;
                petalo.style.animationDelay = Math.random() * 10 + 's';
                petalo.style.animationDuration = Math.random() * 5 + 8 + 's';
                container.appendChild(petalo);
            }
        }

        window.onload = crearPetalos;
    </script>
</body>
</html>
